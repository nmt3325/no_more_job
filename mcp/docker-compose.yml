# バイト求人 統合 MCP サーバーを単一コンテナ・単一ポートで起動する。
#   http://localhost:8000/mcp
services:
  baito-mcp:
    image: ghcr.io/nmt3325/no_more_job:latest
    ports:
      - "${PORT:-8000}:8000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health').read()==b'ok' else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
